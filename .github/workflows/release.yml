name: Release and Deploy

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        run: |
          # v1.0.0 -> 1.0.0
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION=${{ steps.get_version.outputs.version }}

          # CHANGELOG.md에서 해당 버전의 내용 추출
          # ## [1.0.0] 섹션부터 다음 ## 섹션 전까지 추출
          RELEASE_NOTES=$(awk '/^## \['"$VERSION"'\]/, /^## \[/ {
            if (/^## \[/ && !/^## \['"$VERSION"'\]/) exit;
            if (/^## \['"$VERSION"'\]/) { found=1; next }
            if (found) print
          }' CHANGELOG.md)

          # GitHub Actions 멀티라인 출력
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            igor0670/dumpcache:latest
            igor0670/dumpcache:${{ steps.get_version.outputs.tag }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: Release ${{ steps.get_version.outputs.tag }}
          body: |
            ## 🎉 DumpCache ${{ steps.get_version.outputs.tag }}

            ${{ steps.changelog.outputs.notes }}

            ---

            ### 📦 Docker Image

            ```bash
            docker pull igor0670/dumpcache:${{ steps.get_version.outputs.tag }}
            docker pull igor0670/dumpcache:latest
            ```

            ### 🚀 Quick Start

            ```bash
            # 필요한 파일 다운로드
            curl -L -O https://github.com/igor0670/dumpcache/releases/download/${{ steps.get_version.outputs.tag }}/docker-compose.yml
            curl -L -O https://github.com/igor0670/dumpcache/releases/download/${{ steps.get_version.outputs.tag }}/.env.example

            # 데이터 디렉토리 생성
            mkdir -p data/images

            # .env 파일 생성 및 설정
            cp .env.example .env
            nano .env  # 또는 vi .env

            # 실행
            docker compose up -d

            # 로그 확인
            docker compose logs -f
            ```
          files: |
            docker-compose.yml
            .env.example
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
