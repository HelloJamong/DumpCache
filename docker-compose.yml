# Docker Compose 설정 파일
#
# Docker Compose v1과 v2 모두 호환됩니다:
# - v2 (권장): docker compose up -d
# - v1 (레거시): docker-compose up -d
#
# Synology NAS 등 v1만 지원하는 환경에서도 동일하게 작동합니다.

version: '3.8'

services:
  dumpcache-crawler:
    image: igor0670/dumpcache:latest
    container_name: dumpcache-crawler
    restart: unless-stopped

    # 환경 변수 파일 로드
    env_file:
      - .env

    # 볼륨 마운트 (호스트:컨테이너)
    volumes:
      - ./data:/app/data

    # 로그 설정
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # 네트워크 설정
    network_mode: bridge
